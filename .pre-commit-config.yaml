# Local hooks — the same gate suite CI runs. A failing hook aborts the commit.
#
# Setup (one time):
#   uv sync --all-extras
#   uv run pre-commit install
#
# No submodule required. The pytest hook is keyless (external libs mocked);
# real-model tests under tests/pocs/ need network and are skipped offline.
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check src tests scripts
        language: system
        pass_filenames: false

      - id: line-cap-src
        name: line cap (src+tests, raw <=150)
        entry: uv run python scripts/check_line_cap.py src tests --limit 150 --mode raw
        language: system
        pass_filenames: false

      - id: line-cap-scripts
        name: line cap (scripts, logical <=150)
        entry: uv run python scripts/check_line_cap.py scripts --limit 150 --mode logical
        language: system
        pass_filenames: false

      - id: validate-repo
        name: project invariants (paths, layering, config)
        entry: uv run python scripts/validate_repo.py
        language: system
        pass_filenames: false

      - id: check-secrets
        name: secret scan (generic patterns)
        entry: uv run python scripts/check-secrets.py
        language: system
        pass_filenames: false

      - id: no-secrets
        name: secret scan (legacy — kept for compatibility)
        entry: uv run python scripts/check_no_secrets.py
        language: system
        pass_filenames: false

      - id: docs-present
        name: required docs present
        entry: uv run python scripts/check_docs_present.py
        language: system
        pass_filenames: false

      - id: markdown-links
        name: markdown link check
        entry: uv run python scripts/check_markdown_links.py
        language: system
        pass_filenames: false

      - id: source-archives
        name: no tracked archives
        entry: uv run python scripts/check_source_archives.py
        language: system
        pass_filenames: false

      - id: planning-ids
        name: unique task IDs in TODO
        entry: uv run python scripts/check_planning_ids.py
        language: system
        pass_filenames: false

      - id: workflow-permissions
        name: workflow permissions minimal
        entry: uv run python scripts/check_workflow_permissions.py
        language: system
        pass_filenames: false
